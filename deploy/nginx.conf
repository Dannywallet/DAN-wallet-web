# Nginx site config for Danny Wallet (static export served from /var/www/danny-wallet)
# Install: copy to /etc/nginx/sites-available/danny-wallet,
#          symlink into sites-enabled, then `nginx -t && systemctl reload nginx`.

server {
    listen 80;
    listen [::]:80;

    # TODO: replace with your domain, or use _ to match any host (IP access).
    server_name danny.example.com;

    root /var/www/danny-wallet;
    index index.html;

    # Long-cache the immutable build assets.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Clean URLs for the static export:
    #   /        -> index.html
    #   /app     -> app/index.html  (trailingSlash: true emits this)
    # try the path, then path.html, then path/index.html, else 404 page.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
